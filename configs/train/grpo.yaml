# Trajectory-level GRPO with the cost-penalized reward (kgat.train.grpo).
# `lam` is the frontier-sweep knob:
#   python -m kgat.train.grpo -m train.grpo.lam=0.0,0.05,0.1,0.2,0.4 dataset=webqsp
# Nested under `grpo:` so the override path is train.grpo.lam.
grpo:
  # reward (kgat.train.reward; graph signals per docs/DESIGN-GRAPH-RL.md §A/§B)
  lam: 0.1              # cost-penalty weight (see reward.py for the safe range)
  cost_mode: regret     # regret: penalize excess over the per-question BFS oracle
                        # minimum (waste, not need); "absolute" = legacy mode —
                        # then size cost_cap to the dataset's achievable range or
                        # lambda gets no leverage (first-sweep null result)
  cost_axis: hops       # regret compares against oracle min DEPTH -> hops axis
  cost_cap: 4.0         # regret: EXCESS hops mapped to penalty 1.0
  correctness: f1       # "f1" | "hit"

  # exact potential shaping (train-time distance-to-gold; policy-invariant per Ng'99)
  shaping: distance     # "none" disables; gives each hop individual credit
  shaping_scale: 0.15   # per-hop credit unit; keep well under correctness scale

  # rollouts
  group_size: 8         # sampled traversals per question (the G in GRPO)
  temperature: 1.0      # rollout sampling temperature (1.0 = model distribution)
  batch_questions: 4    # questions per optimizer update
  max_questions: null   # cap the train split for smoke runs
  max_prompt_tokens: 1024

  # optimization
  learning_rate: 1.0e-6
  epochs: 1
  kl_coeff: 0.04        # k1 KL estimate vs the adapter-disabled base; 0 disables
  save_every: 50        # updates between adapter checkpoints

  # bias fixes (docs/LIT-REVIEW-2026-07.md; Dr. GRPO defaults, legacy for ablation)
  loss_norm: dr_grpo    # dr_grpo: token-sum / norm_constant (no 1/len length bias)
                        # grpo:    legacy mean-per-token, mean-per-step
  scale_rewards: false  # false: advantage = reward - group mean (no difficulty bias)
                        # true:  legacy z-scoring by group std
  norm_constant: 32.0   # dr_grpo divisor (~max steps x max tokens/step); scales the
                        # effective LR — retune learning_rate if you change it
  clip_eps_low: 0.2     # PPO clip; asymmetric clip-higher per DAPO
  clip_eps_high: 0.28
  updates_per_batch: 1  # >1 reuses rollouts (minibatch epochs); made sound by the
                        # clipped ratio; keep temperature=1.0 when raising this

  # initialization: warm-start from the SFT adapter when present, else fresh LoRA
  init_adapter: outputs/adapters/${model.name}-sft
  output_dir: outputs/adapters/${model.name}-grpo-lam${train.grpo.lam}
  four_bit: auto
  lora_r: 16            # used only for a cold start (no SFT adapter found)
  lora_alpha: 32
  lora_dropout: 0.05
