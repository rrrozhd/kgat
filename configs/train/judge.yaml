# Distill alphina's edge critic into a ~150M cross-encoder (kgat.train.judge).
# Select with train=judge model=crossencoder-modernbert. data_dir points at a
# kgat.data.judge_export output (train/dev/test.jsonl):
#   python -m kgat.data.judge_export --export exports/judge.jsonl --out data/judge
#   python -m kgat.train.judge train=judge model=crossencoder-modernbert
judge:
  data_dir: data/judge
  output_dir: outputs/judges/${model.name}
  max_examples: null          # cap for smoke runs
  max_dev: 5000
  direction_negatives: false  # v3: mint wrong-direction rejects from confident accepts
  dir_neg_min_faith: 0.5      #     source-accept faithfulness floor for minting
  learning_rate: 3.0e-5
  epochs: 1
  batch_size: 16
  grad_accum: 2
  max_seq_len: 1024           # chunks median ~540 tokens; tail truncates
  save_steps: 0               # >0 keeps rolling checkpoints (long interruptible-pod runs)
